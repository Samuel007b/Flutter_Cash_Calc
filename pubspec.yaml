name: flutter_calculadora_juros_compostos
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#66C089"
  image: "assets/richIcon.png"
  android: true
  ios: true

flutter_launcher_icons:
  image_path: "assets/richIcon.png"
  ios: true
  remove_alpha_ios: true
  android: "launcher_icon"
  adaptive_icon_background: "#66C089"
  adaptive_icon_foreground: "assets/richIcon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
